<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mia - El Cuaderno de Recuerdos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="pantalla-contenedor">
        
        <div id="seccion-pastel" class="oculto">
            <div class="mensaje-final">¡Pide un deseo, Mia!</div>
            
            <div class="pastel-contenedor">
                <div class="plato"></div>
                
                <div class="piso-base">
                    <div class="piso-cuerpo cuerpo-abajo"></div>
                    <div class="piso-tapa tapa-abajo"></div>
                    <div class="crema-goteo goteo-abajo"></div>
                </div>
                
                <div class="piso-alto">
                    <div class="piso-cuerpo cuerpo-arriba"></div>
                    <div class="piso-tapa tapa-arriba"></div>
                    <div class="decoracion-crema"></div>
                </div>
                
                <div class="vela-nueva">
                    <div class="flama-nueva"></div>
                </div>

                <img src="oso.png" alt="Oso" class="imagen-borde oso-posicion">
                <img src="regalo.png" alt="Regalo" class="imagen-borde regalo-posicion">
            </div>
        </div>

        <div id="cuaderno" class="cuaderno">
            
            <div class="espiral-conector">
                <div class="anillo"></div><div class="anillo"></div><div class="anillo"></div>
                <div class="anillo"></div><div class="anillo"></div><div class="anillo"></div>
                <div class="anillo"></div><div class="anillo"></div><div class="anillo"></div>
                <div class="anillo"></div><div class="anillo"></div><div class="anillo"></div>
            </div>
            
            <div class="titulo-revista">
                <div class="letra-box r1"><img src="letras/f.png" alt="F"></div>
                <div class="letra-box r2"><img src="letras/e.png" alt="E"></div>
                <div class="letra-box r3"><img src="letras/l.png" alt="L"></div>
                <div class="letra-box r4"><img src="letras/i.png" alt="I"></div>
                <div class="letra-box r5"><img src="letras/z.png" alt="Z"></div>
                
                <div class="espacio-vacio"></div>
                
                <div class="letra-box r2"><img src="letras/c.png" alt="C"></div>
                <div class="letra-box r3"><img src="letras/u.png" alt="U"></div>
                <div class="letra-box r1"><img src="letras/m.png" alt="M"></div>
                <div class="letra-box r5"><img src="letras/p.png" alt="P"></div>
                <div class="letra-box r4"><img src="letras/l.png" alt="L"></div>
                <div class="letra-box r2"><img src="letras/e.png" alt="E"></div>
                <div class="letra-box r3"><img src="letras/a.png" alt="A"></div>
                <div class="letra-box r1"><img src="letras/ñ.png" alt="Ñ"></div>
                <div class="letra-box r5"><img src="letras/o.png" alt="O"></div>
                <div class="letra-box r4"><img src="letras/s.png" alt="S"></div>
                
                <div class="espacio-vacio"></div>
                
                <div class="letra-box r3"><img src="letras/m.png" alt="M"></div>
                <div class="letra-box r1"><img src="letras/i.png" alt="I"></div>
                <div class="letra-box r5"><img src="letras/a.png" alt="A"></div>
            </div>

            <button id="btn-comenzar">✏️</button>

            <div class="hoja-cuaderno">
                <div class="linea-margen-rojo"></div>
                <div id="texto-lapiz" class="texto-lapiz"></div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
